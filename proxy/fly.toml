# fly.toml app configuration file generated for truledgr-proxy on 2025-06-20T21:05:09Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'truledgr-proxy'
primary_region = 'ord'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'

[[services.ports]]
  handlers = ["http"]
  port = 80
  internal_port = 8080

[[services.ports]]
  handlers = ["tls", "http"]
  port = 443
  internal_port = 8443
