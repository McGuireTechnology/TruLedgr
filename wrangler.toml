name = "truledgr-www"
compatibility_date = "2024-08-13"

# Cloudflare Pages configuration for Vue/Vite build
pages_build_output_dir = "www/dist"

# Build configuration:
# - Build command: ./build.sh
# - Build output directory: www/dist
# - Root directory: (empty/default)
# 
# The build script will:
# 1. Run npm ci in the www directory
# 2. Run npm run build to create Vue production build in www/dist
# 3. Cloudflare Pages will serve from www/dist directory
