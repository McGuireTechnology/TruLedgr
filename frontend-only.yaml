# Frontend-only deployment  
name: truledgr-frontend
static_sites:
  - name: frontend
    source_dir: /frontend
    github:
      repo: McGuireTechnology/truledgr
      branch: main
    build_command: npm ci && npm run build
    output_dir: /dist
    index_document: index.html
    error_document: index.html
    envs:
      - key: VITE_API_URL
        value: https://api.truledgr.app
