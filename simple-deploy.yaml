name: truledgr-simple
services:
  - name: api
    source_dir: /
    github:
      repo: McGuireTechnology/truledgr
      branch: main
    run_command: uvicorn main:app --host 0.0.0.0 --port $PORT
    environment_slug: python
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8080
    routes:
      - path: /
    health_check:
      http_path: /health
    envs:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        value: "temp-secret-key-change-in-production"
      - key: JWT_SECRET_KEY
        value: "temp-jwt-secret-change-in-production"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11.10"
