site_name: TruLedgr Documentation
site_description: Documentation for TruLedgr platform
site_url: https://docs.truledgr.app
docs_dir: docs
site_dir: site

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Contributing: 
    - Overview: contributing.md
    - Index: contributing/index.md
    - Getting Started: contributing/getting-started.md
    - Development Guidelines: contributing/development-guidlines.md
    - Branching Strategy: contributing/branching-strategy.md
    - Commit Guidelines: contributing/commit-guidlines.md
    - Pull Request Process: contributing/pull-request-process.md
    - Testing Strategy: contributing/testing-strategy.md
    - Testing Setup: contributing/testing-setup.md
    - Release Process: contributing/release-process.md
    - Release Guide: contributing/release.md
    - Repository Structure: contributing/repository-structure.md
    - Server Ports: contributing/server-ports.md
  - Contributors: contributors.md
  - Support: support.md
  - Release Notes: RELEASE.md
  - Changelog: changelog/index.md

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

plugins:
  - search
  - mkdocstrings

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - md_in_html
