site_name: TruLedgr Documentation
site_description: Documentation for TruLedgr platform
site_url: https://docs.truledgr.app
docs_dir: docs
site_dir: site

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Branding: branding/index.md
  - Contributing: 
    - Overview: contributing.md
    - Index: contributing/index.md
    - Getting Started: contributing/getting-started.md
    - Development Guidelines: contributing/development-guidlines.md
    - Branching Strategy: contributing/branching-strategy.md
    - Commit Guidelines: contributing/commit-guidlines.md
    - Pull Request Process: contributing/pull-request-process.md
    - Testing Strategy: contributing/testing-strategy.md
    - Testing Setup: contributing/testing-setup.md
    - Release Process: contributing/release-process.md
    - Release Guide: contributing/release.md
    - Repository Structure: contributing/repository-structure.md
    - Server Ports: contributing/server-ports.md
  - Contributors: contributors.md
  - Support: support.md
  - Release Notes: RELEASE.md
  - Changelog: changelog/index.md

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode  
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - content.action.edit
    - content.action.view
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

plugins:
  - search
  - mkdocstrings

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - md_in_html
