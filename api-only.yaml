# API-only deployment
name: truledgr-api
services:
  - name: api
    source_dir: /
    github:
      repo: McGuireTechnology/truledgr
      branch: main
    run_command: python -m uvicorn main:app --host 0.0.0.0 --port 8080
    environment_slug: python
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8080
    health_check:
      http_path: /health
    envs:
      - key: PORT
        value: "8080"
      - key: ENVIRONMENT
        value: production
