name = "truledgr-landing"
compatibility_date = "2024-08-21"
pages_build_output_dir = "dist"

# =============================================================================
# PRODUCTION ENVIRONMENT
# =============================================================================
[env.production]
name = "truledgr-landing"
compatibility_date = "2024-08-21"

# =============================================================================
# PREVIEW ENVIRONMENT (for pull requests)
# =============================================================================
[env.preview]
name = "truledgr-landing-preview"
compatibility_date = "2024-08-21"

# =============================================================================
# DEPLOYMENT SETTINGS
# =============================================================================
send_metrics = false

# =============================================================================
# MIME TYPE CONFIGURATION
# =============================================================================
# Explicit MIME type rules to fix Windows Chrome CSS loading issue
[[headers]]
for = "*.css"
[headers.values]
"Content-Type" = "text/css; charset=utf-8"

[[headers]]
for = "/assets/*.css"
[headers.values]
"Content-Type" = "text/css; charset=utf-8"

[[headers]]
for = "*.js"
[headers.values]
"Content-Type" = "application/javascript; charset=utf-8"

[[headers]]
for = "/assets/*.js"
[headers.values]
"Content-Type" = "application/javascript; charset=utf-8"

# =============================================================================
# NOTES
# =============================================================================
# 1. This configuration is for Cloudflare Pages deployment
# 2. Only "production" and "preview" environments are supported by Pages
# 3. Custom domains are configured in Cloudflare Dashboard
# 4. Build settings: npm run build, output: dist, root: landing
# 5. Deploy with: wrangler pages deploy dist --project-name=truledgr-landing