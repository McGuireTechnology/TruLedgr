name = "truledgr-landing"
compatibility_date = "2024-08-21"
pages_build_output_dir = "dist"

# =============================================================================
# PRODUCTION ENVIRONMENT
# =============================================================================
[env.production]
name = "truledgr-landing"
compatibility_date = "2024-08-21"

# =============================================================================
# STAGING ENVIRONMENT
# =============================================================================
[env.staging]
name = "truledgr-landing-staging"
compatibility_date = "2024-08-21"

# =============================================================================
# PREVIEW ENVIRONMENT (for pull requests)
# =============================================================================
[env.preview]
name = "truledgr-landing-preview"
compatibility_date = "2024-08-21"

# =============================================================================
# DEPLOYMENT SETTINGS
# =============================================================================
send_metrics = false

# =============================================================================
# NOTES
# =============================================================================
# 1. This configuration is for Cloudflare Pages deployment
# 2. Custom domains are configured in Cloudflare Dashboard
# 3. Build settings: npm run build, output: dist, root: landing
# 4. Deploy with: wrangler pages deploy dist --project-name=truledgr-landing