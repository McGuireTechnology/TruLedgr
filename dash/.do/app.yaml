# Frontend deployment for Digital Ocean App Platform
name: truledgr-dash
static_sites:
  - name: dash
    source_dir: /
    github:
      repo: McGuireTechnology/truledgr
      branch: main
    build_command: npm ci && npm run build
    output_dir: /dist
    index_document: index.html
    error_document: index.html
    envs:
      - key: VITE_API_URL
        value: https://api.truledgr.app
