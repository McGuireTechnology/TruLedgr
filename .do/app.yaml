name: truledgr-api
services:
  - name: api
    source_dir: /
    github:
      repo: McGuireTechnology/truledgr
      branch: main
    run_command: uvicorn main:app --host 0.0.0.0 --port $PORT
    environment_slug: python
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 80
    routes:
      - path: /
    health_check:
      http_path: /health
    envs:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        value: ${APP_SECRET_KEY}
        type: SECRET
      - key: JWT_SECRET_KEY  
        value: ${JWT_SECRET}
        type: SECRET
      - key: DATABASE_URL
        value: ${DATABASE_URL}
        type: SECRET
      - key: ALLOWED_ORIGINS
        value: https://dash.truledgr.app,https://truledgr.app
databases:
  - name: truledgr-db
    engine: PG
    version: "14"
    size: basic
    num_nodes: 1
